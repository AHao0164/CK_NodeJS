name: Quick Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quick-test:
    name: Quick Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Verify Docker Compose
        run: |
          docker compose config
      
      - name: Check Dockerfiles
        run: |
          echo "Checking Dockerfiles..."
          for dir in gateway/api-gateway services/* adminapp webapp; do
            if [ -f "$dir/Dockerfile" ]; then
              echo "✅ Found Dockerfile in $dir"
            else
              echo "❌ Missing Dockerfile in $dir"
              exit 1
            fi
          done
      
      - name: Check package.json files
        run: |
          echo "Checking package.json files..."
          for dir in gateway/api-gateway services/* adminapp webapp; do
            if [ -f "$dir/package.json" ]; then
              echo "✅ Found package.json in $dir"
            else
              echo "❌ Missing package.json in $dir"
              exit 1
            fi
          done
      
      - name: Summary
        run: |
          echo "✅ All checks passed!"
          echo "Ready for build and deploy"

